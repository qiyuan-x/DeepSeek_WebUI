version: '3.8'

services:
  deepseek-webui:
    build: .
    container_name: deepseek-webui
    ports:
      - "2233:3000"
    volumes:
      - ./data:/app/data
    environment:
      - NODE_ENV=production
      - PORT=3000
      # 取消注释并设置密码以启用基础身份验证 (Basic Auth)
      # - WEBUI_PASSWORD=your_secure_password
      # - WEBUI_USERNAME=admin
    restart: unless-stopped
